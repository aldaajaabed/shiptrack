version: '3.9'

services:
  db:
    image: mysql:8.0
    container_name: shiptrack_db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: shiptrack
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
      MYSQL_USER: shiptrack
      MYSQL_PASSWORD: ${DB_PASSWORD}
    volumes:
      - db_data:/var/lib/mysql
      - ./database/schema.sql:/docker-entrypoint-initdb.d/schema.sql
    ports:
      - "3306:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 10s
      retries: 5

  backend:
    build: ./backend
    container_name: shiptrack_backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      PORT: 5000
      DB_HOST: db
      DB_PORT: 3306
      DB_USER: shiptrack
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: shiptrack
      JWT_SECRET: ${JWT_SECRET}
      FRONTEND_URL: ${FRONTEND_URL}
      TRACKING_BASE_URL: ${TRACKING_BASE_URL}
    volumes:
      - uploads:/app/uploads
    ports:
      - "5000:5000"

  frontend:
    build: ./frontend
    container_name: shiptrack_frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "80:80"
    environment:
      VITE_WHATSAPP: ${WHATSAPP_NUMBER}

  nginx:
    image: nginx:alpine
    container_name: shiptrack_nginx
    restart: unless-stopped
    depends_on:
      - frontend
      - backend
    ports:
      - "443:443"
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/certs:/etc/nginx/certs:ro

volumes:
  db_data:
  uploads:
